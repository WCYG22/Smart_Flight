<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartFlight Prototype</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f7fb; }
    .sf-header { padding: 20px 0; }
    .risk-low { color: #0f5132; background-color: #d1e7dd; }
    .risk-medium { color: #664d03; background-color: #fff3cd; }
    .risk-high { color: #842029; background-color: #f8d7da; }
    .badge-risk { font-size: 0.85rem; }
  </style>
</head>
<body>
<div class="container my-4">
  <div class="sf-header text-center">
    <h2>SmartFlight Disruption Risk Assistant</h2>
    <p class="text-muted">Live delay status and risk using AirLabs</p>
  </div>

  <div class="card mb-4">
    <div class="card-body">
      <form id="searchForm" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Origin (IATA)</label>
          <input type="text" class="form-control" id="origin" placeholder="KUL" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Destination (IATA)</label>
          <input type="text" class="form-control" id="destination" placeholder="SIN" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Date</label>
          <input type="date" class="form-control" id="date" required>
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <button type="submit" class="btn btn-primary w-100">
            Search Itinerary & View Risk
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="resultsSection" class="card d-none">
    <div class="card-body">
      <h5 class="card-title">Results</h5>
      <p class="text-muted" id="resultsSummary"></p>
      <div class="table-responsive">
        <table class="table table-sm table-hover align-middle">
          <thead class="table-light">
          <tr>
            <th>Flight</th>
            <th>Airline</th>
            <th>Sched Dep</th>
            <th>Sched Arr</th>
            <th>Status</th>
            <th>Delay (min)</th>
            <th>Reliability</th>
            <th>Risk</th>
          </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
      <p class="mt-3 text-muted">
        Low: usually on time · Medium: some disruption risk · High: avoid if possible.
      </p>
    </div>
  </div>

  <div id="errorBox" class="alert alert-danger d-none mt-3"></div>
</div>

<script>
  const API_BASE = "https://smart-flight-backend.onrender.com";

  function riskClass(level) {
    if (level === "Low") return "risk-low";
    if (level === "Medium") return "risk-medium";
    return "risk-high";
  }

  document.getElementById("searchForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    document.getElementById("errorBox").classList.add("d-none");

    const origin = document.getElementById("origin").value.trim().toUpperCase();
    const destination = document.getElementById("destination").value.trim().toUpperCase();
    const date = document.getElementById("date").value;

    try {
      const res = await fetch(API_BASE + "/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ origin, destination, date })
      });

      if (!res.ok) throw new Error("Backend error: " + res.status);

      const data = await res.json();
      const tbody = document.getElementById("resultsBody");
      tbody.innerHTML = "";

      if (!data.flights || data.flights.length === 0) {
        document.getElementById("resultsSummary").textContent =
          "No flights found for this route and date.";
      } else {
        document.getElementById("resultsSummary").textContent =
          `Showing ${data.flights.length} flights for ${data.origin} → ${data.destination} on ${data.date}.`;
      }

      data.flights.forEach(f => {
        const tr = document.createElement("tr");
        const delayText = (f.delay_minutes === null || f.delay_minutes === undefined)
          ? "N/A" : f.delay_minutes;

        tr.innerHTML = `
          <td><strong>${f.flight_number}</strong></td>
          <td>${f.airline}</td>
          <td>${f.scheduled_departure || "N/A"}</td>
          <td>${f.scheduled_arrival || "N/A"}</td>
          <td>${f.status || "N/A"}</td>
          <td>${delayText}</td>
          <td>${f.reliability_score}/100</td>
          <td>
            <span class="badge badge-risk ${riskClass(f.risk_level)}">
              ${f.risk_level} (${Math.round(f.disruption_probability * 100)}%)
            </span>
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById("resultsSection").classList.remove("d-none");
    } catch (err) {
      console.error(err);
      const errorBox = document.getElementById("errorBox");
      errorBox.textContent = "Failed to load flights. Please check backend/API key.";
      errorBox.classList.remove("d-none");
    }
  });
</script>
</body>
</html>
