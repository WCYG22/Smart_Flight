<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFlight - Flight Disruption Risk Assistant</title>
    <style>
        :root {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --bg-dark: #1a1a2e;
            --bg-darker: #0f0f1e;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --success: #00d084;
            --warning: #ffd700;
            --danger: #ff4444;
            --info: #00bfff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--bg-darker);
            color: var(--text-light);
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Map Background */
        .map-background {
            flex: 1;
            background: linear-gradient(135deg, #1a3a52 0%, #0f2a3f 100%);
            position: relative;
            overflow: hidden;
        }

        .map-background::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 102, 204, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 208, 132, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Side Panel */
        .side-panel {
            width: 380px;
            background: var(--bg-dark);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-light);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text-light);
        }

        .panel-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Search Form */
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text-light);
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 102, 204, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .search-btn {
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        /* Flight Card */
        .flight-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .flight-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .flight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .flight-number {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.on-time {
            background: rgba(0, 208, 132, 0.2);
            color: var(--success);
        }

        .status-badge.delayed {
            background: rgba(255, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-badge.warning {
            background: rgba(255, 215, 0, 0.2);
            color: var(--warning);
        }

        .flight-route {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .airport-code {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-light);
        }

        .airport-time {
            font-size: 13px;
            color: var(--text-muted);
        }

        .flight-arrow {
            color: var(--text-muted);
            font-size: 12px;
        }

        .flight-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 12px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
        }

        .detail-value {
            color: var(--text-light);
            font-weight: 600;
        }

        /* Risk Indicator */
        .risk-section {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid var(--danger);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .risk-section.warning {
            background: rgba(255, 215, 0, 0.1);
            border-left-color: var(--warning);
        }

        .risk-section.success {
            background: rgba(0, 208, 132, 0.1);
            border-left-color: var(--success);
        }

        .risk-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .risk-description {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Gate Badge */
        .gate-badge {
            display: inline-block;
            background: var(--warning);
            color: #000;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab:hover {
            color: var(--text-light);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Results List */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .result-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
        }

        .result-score {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
        }

        .result-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        .side-panel::-webkit-scrollbar {
            width: 6px;
        }

        .side-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .side-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .side-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .side-panel {
                width: 100%;
                height: 50vh;
            }

            .map-background {
                display: none;
            }

            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Map Background -->
        <div class="map-background"></div>

        <!-- Side Panel -->
        <div class="side-panel">
            <div class="panel-header">
                <div class="panel-title">SmartFlight</div>
                <button class="close-btn" onclick="closeSidePanel()">×</button>
            </div>

            <div class="panel-content">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('search')">Search</button>
                    <button class="tab" onclick="switchTab('results')">Results</button>
                </div>

                <!-- Search Tab -->
                <div id="searchTab" class="tab-content active">
                    <form class="search-form" onsubmit="handleSearch(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label>From</label>
                                <input type="text" id="origin" placeholder="e.g., KUL" required>
                            </div>
                            <div class="form-group">
                                <label>To</label>
                                <input type="text" id="destination" placeholder="e.g., HKG" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <button type="submit" class="search-btn">Search Flights</button>
                    </form>
                </div>

                <!-- Results Tab -->
                <div id="resultsTab" class="tab-content">
                    <div id="resultsContainer" class="results-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://smart-flight-backend.onrender.com";

        // Set default date to 7 days from now
        const today = new Date();
        today.setDate(today.getDate() + 7);
        document.getElementById('date').value = today.toISOString().split('T')[0];

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function closeSidePanel() {
            // Optional: minimize or close panel
        }

        async function handleSearch(e) {
            e.preventDefault();

            const origin = document.getElementById('origin').value.trim().toUpperCase();
            const destination = document.getElementById('destination').value.trim().toUpperCase();
            const date = document.getElementById('date').value;

            if (!origin || !destination || !date) {
                alert('Please fill in all fields');
                return;
            }

            await searchFlights(origin, destination, date);
        }

        async function searchFlights(origin, destination, date) {
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '<div class="loading"><div class="spinner"></div><div>Searching flights...</div></div>';

            try {
                const response = await fetch(API_BASE + '/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ origin, destination, date })
                });

                if (!response.ok) throw new Error('Search failed');

                const data = await response.json();
                displayFlights(data.flights);
                switchTab('results');
            } catch (error) {
                console.error('Error:', error);
                resultsContainer.innerHTML = `<div class="loading" style="color: var(--danger);">Failed to search flights</div>`;
            }
        }

        function displayFlights(flights) {
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '';

            if (!flights || flights.length === 0) {
                resultsContainer.innerHTML = '<div class="loading">No flights found</div>';
                return;
            }

            flights.forEach(flight => {
                const riskLevel = flight.risk_level.toLowerCase();
                const statusClass = riskLevel === 'low' ? 'on-time' : riskLevel === 'medium' ? 'warning' : 'delayed';
                const depTime = flight.scheduled_departure ? flight.scheduled_departure.substring(11, 16) : 'N/A';
                const arrTime = flight.scheduled_arrival ? flight.scheduled_arrival.substring(11, 16) : 'N/A';

                const card = document.createElement('div');
                card.className = 'flight-card';
                card.innerHTML = `
                    <div class="flight-header">
                        <div class="flight-number">${flight.flight_number}</div>
                        <div class="status-badge ${statusClass}">${flight.risk_level}</div>
                    </div>
                    <div class="flight-route">
                        <div>
                            <div class="airport-code">${flight.origin}</div>
                            <div class="airport-time">${depTime}</div>
                        </div>
                        <div class="flight-arrow">→</div>
                        <div>
                            <div class="airport-code">${flight.destination}</div>
                            <div class="airport-time">${arrTime}</div>
                        </div>
                    </div>
                    <div class="flight-details">
                        <div class="detail-item">
                            <div class="detail-label">Airline</div>
                            <div class="detail-value">${flight.airline}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Reliability</div>
                            <div class="detail-value">${flight.reliability_score}%</div>
                        </div>
                    </div>
                    ${riskLevel !== 'low' ? `
                        <div class="risk-section ${statusClass}">
                            <div class="risk-title">Disruption Risk</div>
                            <div class="risk-description">${Math.round(flight.disruption_probability * 100)}% chance of delay</div>
                        </div>
                    ` : ''}
                `;
                resultsContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
