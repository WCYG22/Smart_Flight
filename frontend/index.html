<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartFlight Prototype</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f7fb; }
    .sf-header { padding: 20px 0; }
    .risk-low { color: #0f5132; background-color: #d1e7dd; }
    .risk-medium { color: #664d03; background-color: #fff3cd; }
    .risk-high { color: #842029; background-color: #f8d7da; }
    .badge-risk { font-size: 0.85rem; }
    .leg-input { margin-bottom: 10px; }
    .connection-info { background-color: #e7f3ff; padding: 10px; border-radius: 5px; margin: 10px 0; }
    .itinerary-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
  </style>
</head>
<body>
<div class="container my-4">
  <div class="sf-header text-center">
    <h2>SmartFlight Disruption Risk Assistant</h2>
    <p class="text-muted">Phase 2: Multi-Leg Connection Risk Analysis</p>
  </div>

  <!-- Tab Navigation -->
  <ul class="nav nav-tabs mb-4" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="single-tab" data-bs-toggle="tab" data-bs-target="#single-search" type="button">Single Flight</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="multi-tab" data-bs-toggle="tab" data-bs-target="#multi-search" type="button">Multi-Leg Itinerary</button>
    </li>
  </ul>

  <div class="tab-content">
    <!-- Single Flight Search -->
    <div class="tab-pane fade show active" id="single-search" role="tabpanel">
      <div class="card mb-4">
        <div class="card-body">
          <form id="searchForm" class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Origin (IATA)</label>
              <input type="text" class="form-control" id="origin" placeholder="KUL" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Destination (IATA)</label>
              <input type="text" class="form-control" id="destination" placeholder="SIN" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Date</label>
              <input type="date" class="form-control" id="date" required>
            </div>
            <div class="col-md-3 d-flex align-items-end">
              <button type="submit" class="btn btn-primary w-100">Search Flights</button>
            </div>
          </form>
        </div>
      </div>

      <div id="resultsSection" class="card d-none">
        <div class="card-body">
          <h5 class="card-title">Results</h5>
          <p class="text-muted" id="resultsSummary"></p>
          <div class="table-responsive">
            <table class="table table-sm table-hover align-middle">
              <thead class="table-light">
              <tr>
                <th>Flight</th>
                <th>Airline</th>
                <th>Sched Dep</th>
                <th>Sched Arr</th>
                <th>Status</th>
                <th>Delay (min)</th>
                <th>Reliability</th>
                <th>Risk</th>
              </tr>
              </thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>
          <p class="mt-3 text-muted">
            Low: usually on time · Medium: some disruption risk · High: avoid if possible.
          </p>
        </div>
      </div>
    </div>

    <!-- Multi-Leg Search -->
    <div class="tab-pane fade" id="multi-search" role="tabpanel">
      <div class="card mb-4">
        <div class="card-body">
          <h5>Add Flight Legs (Max 3)</h5>
          <form id="multiLegForm">
            <div id="legsContainer"></div>
            <button type="button" class="btn btn-secondary btn-sm" id="addLegBtn">+ Add Leg</button>
            <div class="mt-3">
              <label class="form-label">Travel Date</label>
              <input type="date" class="form-control" id="multiDate" required>
            </div>
            <button type="submit" class="btn btn-primary mt-3 w-100">Search Itineraries</button>
          </form>
        </div>
      </div>

      <div id="itinerariesSection" class="d-none">
        <h5>Available Itineraries</h5>
        <div id="itinerariesContainer"></div>
      </div>
    </div>
  </div>

  <div id="errorBox" class="alert alert-danger d-none mt-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_BASE = "https://smart-flight-backend.onrender.com";
  let legCount = 0;

  function riskClass(level) {
    if (level === "Low") return "risk-low";
    if (level === "Medium") return "risk-medium";
    return "risk-high";
  }

  // Single Flight Search
  document.getElementById("searchForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    document.getElementById("errorBox").classList.add("d-none");

    const origin = document.getElementById("origin").value.trim().toUpperCase();
    const destination = document.getElementById("destination").value.trim().toUpperCase();
    const date = document.getElementById("date").value;

    try {
      const res = await fetch(API_BASE + "/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ origin, destination, date })
      });

      if (!res.ok) throw new Error("Backend error: " + res.status);

      const data = await res.json();
      const tbody = document.getElementById("resultsBody");
      tbody.innerHTML = "";

      if (!data.flights || data.flights.length === 0) {
        document.getElementById("resultsSummary").textContent = "No flights found.";
      } else {
        document.getElementById("resultsSummary").textContent =
          `Showing ${data.flights.length} flights for ${data.origin} → ${data.destination} on ${data.date}.`;
      }

      data.flights.forEach(f => {
        const tr = document.createElement("tr");
        const delayText = (f.delay_minutes === null || f.delay_minutes === undefined) ? "N/A" : f.delay_minutes;

        tr.innerHTML = `
          <td><strong>${f.flight_number}</strong></td>
          <td>${f.airline}</td>
          <td>${f.scheduled_departure || "N/A"}</td>
          <td>${f.scheduled_arrival || "N/A"}</td>
          <td>${f.status || "N/A"}</td>
          <td>${delayText}</td>
          <td>${f.reliability_score}/100</td>
          <td>
            <span class="badge badge-risk ${riskClass(f.risk_level)}">
              ${f.risk_level} (${Math.round(f.disruption_probability * 100)}%)
            </span>
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById("resultsSection").classList.remove("d-none");
    } catch (err) {
      console.error(err);
      const errorBox = document.getElementById("errorBox");
      errorBox.textContent = "Failed to load flights. " + err.message;
      errorBox.classList.remove("d-none");
    }
  });

  // Multi-Leg Search
  document.getElementById("addLegBtn").addEventListener("click", () => {
    if (legCount >= 3) {
      alert("Maximum 3 legs allowed");
      return;
    }
    legCount++;
    const container = document.getElementById("legsContainer");
    const legDiv = document.createElement("div");
    legDiv.className = "leg-input row g-2 mb-2";
    legDiv.id = `leg-${legCount}`;
    legDiv.innerHTML = `
      <div class="col-md-4">
        <label class="form-label">From (IATA)</label>
        <input type="text" class="form-control leg-origin" placeholder="KUL" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">To (IATA)</label>
        <input type="text" class="form-control leg-destination" placeholder="SIN" required>
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button type="button" class="btn btn-danger btn-sm w-100" onclick="document.getElementById('leg-${legCount}').remove(); legCount--;">Remove</button>
      </div>
    `;
    container.appendChild(legDiv);
  });

  document.getElementById("multiLegForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    document.getElementById("errorBox").classList.add("d-none");

    const legInputs = document.querySelectorAll(".leg-input");
    if (legInputs.length === 0) {
      alert("Please add at least one leg");
      return;
    }

    const legs = [];
    legInputs.forEach(legDiv => {
      const origin = legDiv.querySelector(".leg-origin").value.trim().toUpperCase();
      const destination = legDiv.querySelector(".leg-destination").value.trim().toUpperCase();
      legs.push({ origin, destination });
    });

    const date = document.getElementById("multiDate").value;

    try {
      const res = await fetch(API_BASE + "/search-itinerary", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ legs, date })
      });

      if (!res.ok) throw new Error("Backend error: " + res.status);

      const data = await res.json();
      const container = document.getElementById("itinerariesContainer");
      container.innerHTML = "";

      data.itineraries.forEach((itinerary, idx) => {
        const card = document.createElement("div");
        card.className = "itinerary-card";
        
        let flightsHtml = "";
        itinerary.flights.forEach((f, fIdx) => {
          flightsHtml += `
            <div style="margin-bottom: 10px;">
              <strong>${f.flight_number}</strong> (${f.airline}) - ${f.origin} → ${f.destination}<br>
              Dep: ${f.scheduled_departure} | Arr: ${f.scheduled_arrival}<br>
              <span class="badge badge-risk ${riskClass(f.risk_level)}">${f.risk_level}</span>
            </div>
          `;
          
          if (fIdx < itinerary.connections.length) {
            const conn = itinerary.connections[fIdx];
            flightsHtml += `
              <div class="connection-info">
                Connection Time: ${conn.connection_time_minutes} min | Risk: ${conn.connection_risk}
              </div>
            `;
          }
        });

        card.innerHTML = `
          <h6>Itinerary ${idx + 1}</h6>
          ${flightsHtml}
          <hr>
          <strong>Overall Risk:</strong> <span class="badge badge-risk ${riskClass(itinerary.overall_risk_level)}">${itinerary.overall_risk_level}</span><br>
          <strong>Reliability:</strong> ${itinerary.overall_reliability_score}/100
        `;
        container.appendChild(card);
      });

      document.getElementById("itinerariesSection").classList.remove("d-none");
    } catch (err) {
      console.error(err);
      const errorBox = document.getElementById("errorBox");
      errorBox.textContent = "Failed to load itineraries. " + err.message;
      errorBox.classList.remove("d-none");
    }
  });

  // Initialize with one leg
  document.getElementById("addLegBtn").click();
</script>
</body>
</html>
